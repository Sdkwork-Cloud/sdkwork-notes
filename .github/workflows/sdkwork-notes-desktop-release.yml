name: sdkwork-notes-desktop-release

on:
  push:
    tags:
      - 'sdkwork-notes-release-*'
  workflow_dispatch:
    inputs:
      release_tag:
        description: Existing release tag to publish
        required: true
        type: string
      git_ref:
        description: Git ref to build; defaults to refs/tags/<release_tag>
        required: false
        type: string

permissions:
  contents: write

concurrency:
  group: sdkwork-notes-desktop-release-${{ github.ref_name }}
  cancel-in-progress: true

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: 'true'
  SDKWORK_SHARED_SDK_MODE: git
  SDKWORK_SHARED_SDK_GIT_REF: main
  SDKWORK_SHARED_SDK_APP_REPO_URL: https://github.com/Sdkwork-Cloud/sdkwork-sdk-app.git
  SDKWORK_SHARED_SDK_COMMON_REPO_URL: https://github.com/Sdkwork-Cloud/sdkwork-sdk-commons.git

jobs:
  prepare:
    runs-on: ubuntu-latest
    outputs:
      release_tag: ${{ steps.resolve.outputs.release_tag }}
      git_ref: ${{ steps.resolve.outputs.git_ref }}
    steps:
      - name: Resolve release target
        id: resolve
        shell: bash
        run: |
          if [[ "${GITHUB_EVENT_NAME}" == "push" ]]; then
            release_tag="${GITHUB_REF_NAME}"
            git_ref="${GITHUB_REF}"
          else
            release_tag="${{ github.event.inputs.release_tag }}"
            git_ref="${{ github.event.inputs.git_ref }}"
            if [[ -z "$git_ref" ]]; then
              git_ref="refs/tags/$release_tag"
            fi
          fi

          echo "release_tag=$release_tag" >> "$GITHUB_OUTPUT"
          echo "git_ref=$git_ref" >> "$GITHUB_OUTPUT"

  verify-release:
    name: Verify release inputs
    needs: prepare
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: sdkwork-notes-pc-react
    steps:
      - name: Checkout release ref
        uses: actions/checkout@v5
        with:
          ref: ${{ needs.prepare.outputs.git_ref }}
          fetch-depth: 0

      - name: Setup pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 10

      - name: Setup Node.js
        uses: actions/setup-node@v5
        with:
          node-version: 22
          cache: pnpm
          cache-dependency-path: sdkwork-notes-pc-react/pnpm-lock.yaml

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable

      - name: Cache Rust dependencies
        uses: Swatinem/rust-cache@v2
        with:
          workspaces: |
            sdkwork-notes-pc-react/packages/sdkwork-notes-desktop/src-tauri

      - name: Install Linux desktop dependencies
        shell: bash
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            file \
            libfuse2t64 \
            libgbm-dev \
            libgtk-3-dev \
            libwebkit2gtk-4.1-dev \
            libappindicator3-dev \
            libpipewire-0.3-dev \
            libssl-dev \
            librsvg2-dev \
            libwayland-dev \
            libxkbcommon-dev \
            pkg-config \
            rpm \
            patchelf

      - name: Prepare git-backed shared SDK sources
        run: node scripts/prepare-shared-sdk-git-sources.mjs

      - name: Install workspace dependencies
        run: pnpm install --frozen-lockfile

      - name: Build shared SDK packages
        run: pnpm prepare:shared-sdk

      - name: Run release verification
        shell: bash
        run: |
          pnpm test:desktop:contracts
          pnpm --filter @sdkwork/notes-shell test
          pnpm --filter @sdkwork/notes-desktop test
          pnpm test:desktop:rust
          pnpm typecheck
          pnpm build

  desktop-release:
    name: Desktop release (${{ matrix.platform }}-${{ matrix.arch }})
    needs: [prepare, verify-release]
    runs-on: ${{ matrix.runner }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - runner: windows-2022
            platform: windows
            arch: x64
            target: x86_64-pc-windows-msvc
          - runner: windows-11-arm
            platform: windows
            arch: arm64
            target: aarch64-pc-windows-msvc
          - runner: ubuntu-24.04
            platform: linux
            arch: x64
            target: x86_64-unknown-linux-gnu
          - runner: ubuntu-24.04-arm
            platform: linux
            arch: arm64
            target: aarch64-unknown-linux-gnu
          - runner: macos-15-intel
            platform: macos
            arch: x64
            target: x86_64-apple-darwin
          - runner: macos-15
            platform: macos
            arch: arm64
            target: aarch64-apple-darwin
    defaults:
      run:
        working-directory: sdkwork-notes-pc-react
    steps:
      - name: Checkout release ref
        uses: actions/checkout@v5
        with:
          ref: ${{ needs.prepare.outputs.git_ref }}
          fetch-depth: 0

      - name: Setup pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 10

      - name: Setup Node.js
        uses: actions/setup-node@v5
        with:
          node-version: 22
          cache: pnpm
          cache-dependency-path: sdkwork-notes-pc-react/pnpm-lock.yaml

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.target }}

      - name: Cache Rust dependencies
        uses: Swatinem/rust-cache@v2
        with:
          workspaces: |
            sdkwork-notes-pc-react/packages/sdkwork-notes-desktop/src-tauri

      - name: Install Linux desktop dependencies
        if: matrix.platform == 'linux'
        shell: bash
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            file \
            libfuse2t64 \
            libgbm-dev \
            libgtk-3-dev \
            libwebkit2gtk-4.1-dev \
            libappindicator3-dev \
            libpipewire-0.3-dev \
            libssl-dev \
            librsvg2-dev \
            libwayland-dev \
            libxkbcommon-dev \
            pkg-config \
            rpm \
            patchelf

      - name: Prepare git-backed shared SDK sources
        run: node scripts/prepare-shared-sdk-git-sources.mjs

      - name: Install workspace dependencies
        run: pnpm install --frozen-lockfile

      - name: Build shared SDK packages
        run: pnpm prepare:shared-sdk

      - name: Build Notes desktop bundle on Windows
        if: matrix.platform == 'windows'
        env:
          CMAKE_GENERATOR: Visual Studio 17 2022
          HOST_CMAKE_GENERATOR: Visual Studio 17 2022
        run: pnpm release:desktop -- --target ${{ matrix.target }}

      - name: Build Notes desktop bundle on Unix
        if: matrix.platform != 'windows'
        run: pnpm release:desktop -- --target ${{ matrix.target }}

      - name: Upload desktop release assets
        uses: actions/upload-artifact@v4
        with:
          name: sdkwork-notes-desktop-${{ matrix.platform }}-${{ matrix.arch }}
          path: sdkwork-notes-pc-react/packages/sdkwork-notes-desktop/src-tauri/target/${{ matrix.target }}/release/bundle/**/*
          if-no-files-found: error

  publish:
    name: Publish GitHub release
    needs:
      - prepare
      - verify-release
      - desktop-release
    runs-on: ubuntu-latest
    steps:
      - name: Download packaged release assets
        uses: actions/download-artifact@v4
        with:
          pattern: sdkwork-notes-desktop-*
          path: release-assets
          merge-multiple: true

      - name: Publish release assets
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ needs.prepare.outputs.release_tag }}
          name: SDKWork Notes ${{ needs.prepare.outputs.release_tag }}
          generate_release_notes: true
          overwrite_files: true
          fail_on_unmatched_files: true
          files: |
            release-assets/**/*
