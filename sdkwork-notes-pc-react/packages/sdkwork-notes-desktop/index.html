<!doctype html>
<html lang="zh-CN">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <meta name="theme-color" content="#f3f5f9" />
    <title>Notes Studio Desktop</title>
    <style>
      :root {
        color-scheme: light;
        background: #f3f5f9;
        color: #122033;
      }

      :root.dark {
        color-scheme: dark;
        background: #0d111a;
        color: #f4f7ff;
      }

      html,
      body,
      #root {
        margin: 0;
        min-height: 100%;
        height: 100%;
        overflow: hidden;
        background: inherit;
        color: inherit;
      }

      body {
        font-family:
          "Segoe UI Variable Text",
          "PingFang SC",
          "Noto Sans SC",
          sans-serif;
      }
    </style>
    <script>
      (() => {
        const STORAGE_KEY = 'sdkwork-notes-app-storage';
        const root = document.documentElement;
        const payload = { themeMode: 'system', themeColor: 'default', languagePreference: 'zh-CN' };

        try {
          const persisted = JSON.parse(localStorage.getItem(STORAGE_KEY) || 'null');
          if (persisted && typeof persisted === 'object' && persisted.state) {
            const state = persisted.state;
            if (typeof state.themeMode === 'string') {
              payload.themeMode = state.themeMode;
            }
            if (typeof state.themeColor === 'string') {
              payload.themeColor = state.themeColor;
            }
            if (typeof state.languagePreference === 'string') {
              payload.languagePreference = state.languagePreference;
            }
          }
        } catch {
          // Ignore malformed startup snapshots and keep the defaults.
        }

        const prefersDark =
          payload.themeMode === 'dark'
          || (
            payload.themeMode !== 'light'
            && window.matchMedia
            && window.matchMedia('(prefers-color-scheme: dark)').matches
          );

        root.setAttribute('lang', payload.languagePreference);
        root.setAttribute('data-app-platform', 'desktop');
        root.setAttribute('data-theme', payload.themeColor);
        root.classList.toggle('dark', prefersDark);
        root.style.colorScheme = prefersDark ? 'dark' : 'light';
      })();
    </script>
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>
